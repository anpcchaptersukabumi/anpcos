<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HALLO SUPER ADMIN | ANPC Chapter Sukabumi</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
  :root { --gold:#D4AF37; --red:#B91C1C; --red-bright:#E11D1D; --black:#060606; --black-2:#0D0D0D; --black-3:#161412; --black-4:#1A1714; --grey:#9A9690; --grey-light:#C9C5BE; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:#fff; font-family:'Rajdhani',sans-serif; min-height:100vh; }
  .hidden { display:none !important; }
  #loginGate { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .login-box { background:linear-gradient(160deg,var(--black-3),var(--black-2)); border:1px solid rgba(212,175,55,0.25); padding:2.5rem; width:100%; max-width:380px; text-align:center; }
  .login-box h1 { font-family:'Cinzel',serif; font-weight:700; color:var(--gold); font-size:1.5rem; margin-bottom:0.4rem; }
  .login-box p { color:var(--grey); font-size:0.85rem; margin-bottom:1.5rem; }
  .login-box input { width:100%; background:var(--black-4); border:1px solid rgba(212,175,55,0.18); color:#fff; padding:12px 14px; font-family:'Rajdhani',sans-serif; font-size:1rem; outline:none; margin-bottom:1rem; }
  .login-box input:focus { border-color:var(--gold); }
  .login-box button { width:100%; background:linear-gradient(135deg,var(--red-bright),var(--red)); color:#fff; border:none; padding:13px; font-weight:700; font-size:0.9rem; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; }
  .login-error { color:#F87171; font-size:0.82rem; margin-top:10px; font-weight:600; min-height:18px; }
  #dashboard { display:none; }
  header { border-bottom:1px solid rgba(212,175,55,0.15); padding:1.2rem 2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; background:var(--black-2); }
  header h1 { font-family:'Cinzel',serif; font-weight:700; color:var(--gold); font-size:1.2rem; }
  header .sub { font-size:0.7rem; color:var(--grey); font-weight:600; letter-spacing:1px; }
  .btn-outline { background:transparent; border:1px solid var(--gold); color:var(--gold); padding:9px 16px; font-weight:700; font-size:0.78rem; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
  .btn-outline:hover { background:rgba(212,175,55,0.1); }
  .search-wrap input { width:260px; background:var(--black-4); border:1px solid rgba(212,175,55,0.18); color:#fff; padding:9px 12px; font-family:'Rajdhani',sans-serif; font-size:0.88rem; outline:none; }
  .search-wrap input:focus { border-color:var(--gold); }
  main { padding:1.5rem 2rem; max-width:1100px; margin:0 auto; }
  .tabs { display:flex; gap:10px; margin-bottom:1.6rem; flex-wrap:wrap; }
  .tab-btn { display:flex; align-items:center; gap:8px; background:var(--black-3); border:1px solid rgba(212,175,55,0.12); color:var(--grey); padding:9px 16px; font-weight:700; font-size:0.8rem; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
  .tab-btn.active { background:rgba(212,175,55,0.12); border-color:var(--gold); color:var(--gold); }
  .tab-btn .count { background:#2a2620; color:var(--grey); border-radius:10px; padding:1px 8px; font-size:0.72rem; font-weight:700; }
  .tab-btn.active .count { background:var(--gold); color:#000; }
  .empty-state { text-align:center; padding:4rem 0; color:#6b665e; }
  .loading-state { text-align:center; padding:4rem 0; color:var(--grey); }
  .member-card { background:var(--black-3); border:1px solid rgba(212,175,55,0.1); padding:1.1rem 1.4rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:10px; }
  .member-card .nama { font-weight:700; font-size:1.02rem; }
  .member-meta { display:flex; gap:14px; flex-wrap:wrap; margin-top:6px; font-size:0.8rem; color:var(--grey); font-weight:500; }
  .member-tahun { margin-top:6px; font-size:0.78rem; color:var(--gold); font-weight:600; }
  .member-gabung { margin-top:3px; font-size:0.76rem; color:var(--grey); font-weight:500; }
  .member-saran { margin-top:8px; padding:8px 12px; background:rgba(212,175,55,0.06); border-left:2px solid rgba(212,175,55,0.3); font-size:0.79rem; color:#C9C5BE; line-height:1.5; font-style:italic; max-width:560px; }
  .badge { font-size:0.72rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border:1px solid; }
  .badge-pending { color:var(--gold); border-color:var(--gold); }
  .badge-approved { color:#4ADE80; border-color:#4ADE80; }
  .badge-rejected { color:#F87171; border-color:#F87171; }
  .action-row { display:flex; align-items:center; gap:10px; }
  .icon-btn { width:34px; height:34px; cursor:pointer; display:flex; align-items:center; justify-content:center; border:1px solid; background:transparent; font-size:1rem; }
  .icon-btn.approve { border-color:#4ADE80; color:#4ADE80; background:rgba(74,222,128,0.1); }
  .icon-btn.reject { border-color:#F87171; color:#F87171; background:rgba(248,113,113,0.1); }
  .icon-btn.delete { border-color:rgba(255,255,255,0.15); color:var(--grey); background:rgba(255,255,255,0.04); }
 .toast { position:fixed; top:20px; right:20px; z-index:200; background:var(--black-4); border:1px solid var(--gold); color:var(--gold); padding:12px 20px; font-weight:600; font-size:0.88rem; box-shadow:0 8px 30px rgba(0,0,0,0.5); display:none; }
  .section-switch { display:flex; gap:10px; margin-bottom:1.6rem; flex-wrap:wrap; }
  .section-btn { background:var(--black-3); border:1px solid rgba(212,175,55,0.18); color:var(--grey-light); padding:11px 20px; font-weight:700; font-size:0.82rem; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
  .section-btn.active { background:linear-gradient(135deg, rgba(212,175,55,0.18), rgba(212,175,55,0.06)); border-color:var(--gold); color:var(--gold); }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
  .modal-box { background:linear-gradient(160deg,var(--black-3),var(--black-2)); border:1px solid rgba(212,175,55,0.3); padding:2rem; width:100%; max-width:380px; }
  .modal-box h3 { font-family:'Cinzel',serif; color:var(--gold); font-size:1.1rem; margin-bottom:8px; }
  .modal-box input { width:100%; background:var(--black-4); border:1px solid rgba(212,175,55,0.18); color:#fff; padding:11px 13px; font-family:'Rajdhani',sans-serif; font-size:1rem; outline:none; }
  .modal-box input:focus { border-color:var(--gold); }
  .modal-box .action-buttons { display:flex; gap:10px; margin-top:16px; }
  .modal-box .action-buttons button { flex:1; }
  .btn-solid { background:linear-gradient(135deg,var(--red-bright),var(--red)); color:#fff; border:none; padding:11px; font-weight:700; font-size:0.85rem; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
  .modal-box.wide { max-width:560px; }
  .modal-box label { display:block; font-size:0.78rem; color:var(--grey); margin:10px 0 4px; text-transform:uppercase; letter-spacing:1px; font-weight:600; }
  .modal-box textarea { width:100%; background:var(--black-4); border:1px solid rgba(212,175,55,0.18); color:#fff; padding:11px 13px; font-family:'Rajdhani',sans-serif; font-size:1rem; outline:none; resize:vertical; min-height:70px; }
  .modal-box textarea:focus { border-color:var(--gold); }
  .checklist { max-height:50vh; overflow-y:auto; margin:14px 0; border:1px solid rgba(212,175,55,0.1); }
  .checklist-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; }
  .checklist-item:last-child { border-bottom:none; }
  .checklist-item input[type=checkbox] { width:18px; height:18px; accent-color:var(--gold); cursor:pointer; }
</style>
</head>

<div id="loginGate">
  <div class="login-box">
    <h1>Hallo Super Admin</h1>
    <p>ANPC Chapter Sukabumi</p>
    <input type="email" id="adminEmail" placeholder="Email admin" onkeydown="if(event.key==='Enter') document.getElementById('adminPass').focus()"/>

</div>

<div id="dashboard">

    <div>

    </div>
    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">

<main>

      <button class="section-btn" id="btnSectionGaleri" onclick="switchSection('galeri')">🖼️ Galeri</button>
      <button class="section-btn" id="btnSectionPengurus" onclick="switchSection('pengurus')">🎗️ Struktur Pengurus</button>
      <button class="section-btn" id="btnSectionGarasi" onclick="switchSection('garasi')">🏠 Data Garasi</button>
    </div>

    <div id="sectionMembers">

    <div id="sectionProfiles" class="hidden">

</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay hidden" id="editNoModal">

<div class="modal-overlay hidden" id="pengurusModal">

    <div class="action-buttons">
      <button class="btn-outline" onclick="closeAttendanceModal()">Tutup</button>
      <button class="btn-solid" onclick="saveAttendance()">Simpan Kehadiran</button>
    </div>
  </div>

<script>
let allMembers = [];
let activeTab = "pending";
let allProfiles = [];
let activeProfileTab = "aktif";
let activeSection = "members";
let allEvents = [];
let activeEventTab = "mendatang";
let currentAttendanceEventId = null;
let attendanceMemberIds = new Set();
let allKegiatan = [];
let allGaleri = [];
let allPengurus = [];
let allGarasiAdmin = [];

async function checkLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const pass = document.getElementById('adminPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';
  if (!email || !pass) {
    errEl.textContent = 'Isi email dan password.';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Memeriksa...';

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });

  if (error) {
    errEl.textContent = 'Email atau password salah.';
    btn.disabled = false;
    btn.textContent = 'Masuk';
    return;
  }

  const { data: profile, error: profileError } = await supabaseClient
    .from('profiles')
    .select('role')
    .eq('id', data.user.id)
    .single();

  if (profileError || !profile || !['admin', 'pengurus'].includes(profile.role)) {
    errEl.textContent = 'Akun ini tidak punya akses admin.';
    await supabaseClient.auth.signOut();
    btn.disabled = false;
    btn.textContent = 'Masuk';
    return;
  }

  showDashboard();
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

function showDashboard() {
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadMembers();
}

async function initAuthCheck() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) {
    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('role')
      .eq('id', session.user.id)
      .single();
    if (profile && ['admin', 'pengurus'].includes(profile.role)) {
      showDashboard();
      return;
    }
    await supabaseClient.auth.signOut();
  }
}
window.addEventListener('DOMContentLoaded', initAuthCheck);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

async function loadMembers() {
  document.getElementById('listContainer').innerHTML = '<div class="loading-state">Memuat data...</div>';
  const { data, error } = await supabaseClient.from('members').select('*').order('created_at', { ascending: false });
  if (error) {
    document.getElementById('listContainer').innerHTML = `<div class="empty-state">Gagal memuat data: ${error.message}</div>`;
    return;
  }
  allMembers = data || [];
  renderTabs();
  renderList();
}

function renderTabs() {
  const counts = {
    pending: allMembers.filter(m => m.status === 'pending').length,
    approved: allMembers.filter(m => m.status === 'approved').length,
    rejected: allMembers.filter(m => m.status === 'rejected').length,
    all: allMembers.length,
  };
  const tabDefs = [
    { key: 'pending', label: 'Menunggu' },
    { key: 'approved', label: 'Disetujui' },
    { key: 'rejected', label: 'Ditolak' },
    { key: 'all', label: 'Semua' },
  ];
  document.getElementById('tabs').innerHTML = tabDefs.map(t => `
    <button class="tab-btn ${activeTab === t.key ? 'active' : ''}" onclick="setTab('${t.key}')">
      ${t.label} <span class="count">${counts[t.key]}</span>
    </button>
  `).join('') + `<button class="btn-outline" style="margin-left:auto;" onclick="loadMembers()">⟳ Muat Ulang</button>`;
}

function setTab(key) {
  activeTab = key;
  renderTabs();
  renderList();
}

function renderList() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let filtered = activeTab === 'all' ? allMembers : allMembers.filter(m => m.status === activeTab);
  if (search) {
    filtered = filtered.filter(m => (m.nama + m.whatsapp + (m.domisili||'')).toLowerCase().includes(search));
  }
  const container = document.getElementById('listContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">Tidak ada data member di kategori ini.</div>';
    return;
  }
  container.innerHTML = filtered.map(m => {
    const date = new Date(m.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
    const badgeClass = m.status === 'approved' ? 'badge-approved' : m.status === 'rejected' ? 'badge-rejected' : 'badge-pending';
    const badgeLabel = m.status === 'approved' ? 'Disetujui' : m.status === 'rejected' ? 'Ditolak' : 'Menunggu';
    return `
      <div class="member-card">
        <div style="min-width:200px;flex:1;">
          <div class="nama">${escapeHtml(m.nama)}</div>
          <div class="member-meta">
            <span>📱 ${escapeHtml(m.whatsapp)}</span>
            ${m.domisili ? `<span>📍 ${escapeHtml(m.domisili)}</span>` : ''}
            <span>📅 ${date}</span>
          </div>
          <div class="member-tahun">${escapeHtml(m.tahun_pcx)}</div>
          ${m.tahun_gabung ? `<div class="member-gabung">🗓️ Gabung ANPC sejak: <strong style="color:var(--gold)">${escapeHtml(m.tahun_gabung)}</strong></div>` : ''}
          ${m.kritik_saran ? `<div class="member-saran">💬 "${escapeHtml(m.kritik_saran)}"</div>` : ''}
        </div>
        <div class="action-row">
          <span class="badge ${badgeClass}">${badgeLabel}</span>
          ${m.status !== 'approved' ? `<button class="icon-btn approve" onclick="updateStatus('${m.id}','approved')" title="Setujui">✓</button>` : ''}
          ${m.status !== 'rejected' ? `<button class="icon-btn reject" onclick="updateStatus('${m.id}','rejected')" title="Tolak">✕</button>` : ''}
          <button class="icon-btn delete" onclick="deleteMember('${m.id}','${escapeHtml(m.nama)}')" title="Hapus">🗑</button>
        </div>
      </div>
    `;
  }).join('');
}

async function updateStatus(id, status) {
  const { error } = await supabaseClient.from('members').update({ status }).eq('id', id);
  if (error) { showToast('Gagal memperbarui status'); return; }
  const m = allMembers.find(x => x.id === id);
  if (m) m.status = status;
  renderTabs();
  renderList();
  showToast(status === 'approved' ? 'Member disetujui ✓' : 'Member ditolak');
}

async function deleteMember(id, nama) {
  if (!confirm(`Hapus data ${nama}? Tindakan ini tidak bisa dibatalkan.`)) return;
  const { error } = await supabaseClient.from('members').delete().eq('id', id);
  if (error) { showToast('Gagal menghapus data'); return; }
  allMembers = allMembers.filter(x => x.id !== id);
  renderTabs();
  renderList();
  showToast(`Data ${nama} dihapus`);
}

function onSearchInput() {
  if (activeSection === 'members') renderList();
  else renderProfileList();
}

function switchSection(name) {
  activeSection = name;
  document.getElementById('btnSectionMembers').classList.toggle('active', name === 'members');
  document.getElementById('btnSectionProfiles').classList.toggle('active', name === 'profiles');
  document.getElementById('btnSectionEvents').classList.toggle('active', name === 'events');
  document.getElementById('btnSectionKegiatan').classList.toggle('active', name === 'kegiatan');
  document.getElementById('btnSectionGaleri').classList.toggle('active', name === 'galeri');
  document.getElementById('btnSectionPengurus').classList.toggle('active', name === 'pengurus');
  document.getElementById('btnSectionGarasi').classList.toggle('active', name === 'garasi');
  document.getElementById('sectionMembers').classList.toggle('hidden', name !== 'members');
  document.getElementById('sectionProfiles').classList.toggle('hidden', name !== 'profiles');
  document.getElementById('sectionEvents').classList.toggle('hidden', name !== 'events');
  document.getElementById('sectionKegiatan').classList.toggle('hidden', name !== 'kegiatan');
  document.getElementById('sectionGaleri').classList.toggle('hidden', name !== 'galeri');
  document.getElementById('sectionPengurus').classList.toggle('hidden', name !== 'pengurus');
  document.getElementById('sectionGarasi').classList.toggle('hidden', name !== 'garasi');
  document.getElementById('searchInput').value = '';
  if (name === 'profiles') {
    if (allProfiles.length === 0) loadProfiles();
    else { renderProfileTabs(); renderProfileList(); }
  } else if (name === 'events') {
    if (allEvents.length === 0) loadEvents();
    else { renderEventTabs(); renderEventsList(); }
  } else if (name === 'kegiatan') {
    loadKegiatan();
  } else if (name === 'galeri') {
    loadGaleri();
  } else if (name === 'pengurus') {
    loadPengurus();
  } else if (name === 'garasi') {
    loadGarasiAdmin();
  } else {
    renderList();
  }
}

async function loadProfiles() {
  document.getElementById('profileListContainer').innerHTML = '<div class="loading-state">Memuat data...</div>';
  const { data, error } = await supabaseClient.from('profiles').select('*').order('no_anggota', { ascending: true });
  if (error) {
    document.getElementById('profileListContainer').innerHTML = `<div class="empty-state">Gagal memuat data: ${error.message}</div>`;
    return;
  }
  allProfiles = (data || []).filter(p => !['admin', 'pengurus'].includes(p.role));
  renderProfileTabs();
  renderProfileList();
}

function renderProfileTabs() {
  const counts = {
    aktif: allProfiles.filter(p => p.status === 'aktif').length,
    locked: allProfiles.filter(p => p.status === 'locked').length,
    nonaktif: allProfiles.filter(p => p.status === 'nonaktif').length,
    all: allProfiles.length,
  };
  const tabDefs = [
    { key: 'aktif', label: 'Aktif' },
    { key: 'locked', label: 'Terkunci' },
    { key: 'nonaktif', label: 'Nonaktif' },
    { key: 'all', label: 'Semua' },
  ];
  document.getElementById('profileTabs').innerHTML = tabDefs.map(t => `
    <button class="tab-btn ${activeProfileTab === t.key ? 'active' : ''}" onclick="setProfileTab('${t.key}')">
      ${t.label} <span class="count">${counts[t.key]}</span>
    </button>
  `).join('') + `<button class="btn-outline" style="margin-left:auto;" onclick="loadProfiles()">⟳ Muat Ulang</button>`;
}

function setProfileTab(key) {
  activeProfileTab = key;
  renderProfileTabs();
  renderProfileList();
}

function renderProfileList() {

function closeEditNoModal() {

async function saveNoAnggota() {

async function loadEvents() {
  document.getElementById('eventListContainer').innerHTML = '<div class="loading-state">Memuat data...</div>';

}

function renderEventTabs() {
  const today = new Date().toISOString().slice(0, 10);
  const counts = {
    mendatang: allEvents.filter(e => e.tanggal >= today).length,
    selesai: allEvents.filter(e => e.tanggal < today).length,
    semua: allEvents.length,
  };
  const tabDefs = [
    { key: 'mendatang', label: 'Mendatang' },
    { key: 'selesai', label: 'Selesai' },
    { key: 'semua', label: 'Semua' },
  ];
  document.getElementById('eventTabs').innerHTML = tabDefs.map(t => `
    <button class="tab-btn ${activeEventTab === t.key ? 'active' : ''}" onclick="setEventTab('${t.key}')">
      ${t.label} <span class="count">${counts[t.key]}</span>
    </button>
  `).join('');
}

function setEventTab(key) {
  activeEventTab = key;
  renderEventTabs();
  renderEventsList();
}

function renderEventsList() {
  const today = new Date().toISOString().slice(0, 10);
  let filtered = allEvents;
  if (activeEventTab === 'mendatang') filtered = allEvents.filter(e => e.tanggal >= today);
  else if (activeEventTab === 'selesai') filtered = allEvents.filter(e => e.tanggal < today);

  const container = document.getElementById('eventListContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">Belum ada event di kategori ini.</div>';
    return;
  }
 container.innerHTML = filtered.map(e => {
    const tanggalFmt = new Date(e.tanggal).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    return `
      <div class="member-card">
       ${e.gambar_url ? `<img src="${e.gambar_url}" style="width:64px; height:64px; object-fit:cover; flex-shrink:0; border-radius:10px;"/>` : ''}
        <div style="min-width:200px;flex:1;">
          <div class="nama">${escapeHtml(e.nama)} ${e.is_resmi === false ? '' : '<span class="badge badge-approved" style="margin-left:8px; vertical-align:middle;">RESMI</span>'}</div>
          <div class="member-meta">
            <span>📅 ${tanggalFmt}</span>
            ${e.lokasi ? `<span>📍 ${escapeHtml(e.lokasi)}</span>` : ''}
            ${e.jarak ? `<span>🏍️ ${escapeHtml(e.jarak)}</span>` : ''}

    `;

}

function previewEventFoto(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const preview = document.getElementById('eventFotoPreview');
  preview.src = URL.createObjectURL(file);
  preview.classList.remove('hidden');
}

async function uploadEventImage(file) {
  const ext = file.name.split('.').pop();
  const fileName = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error } = await supabaseClient.storage.from('event-images').upload(fileName, file);
  if (error) throw error;
  const { data } = supabaseClient.storage.from('event-images').getPublicUrl(fileName);
  return data.publicUrl;
}

function openEventModal(id) {
  const modal = document.getElementById('eventModal');
  modal.dataset.eventId = id || '';
  document.getElementById('eventFoto').value = '';
  const preview = document.getElementById('eventFotoPreview');
  if (id) {
    const e = allEvents.find(x => x.id === id);
    document.getElementById('eventModalTitle').textContent = 'Edit Event';
    document.getElementById('eventNama').value = e.nama || '';
    document.getElementById('eventDeskripsi').value = e.deskripsi || '';
    document.getElementById('eventTanggal').value = e.tanggal || '';
    document.getElementById('eventLokasi').value = e.lokasi || '';
    document.getElementById('eventJarak').value = e.jarak || '';
    document.getElementById('eventResmi').checked = e.is_resmi !== false;
    document.getElementById('eventRute').value = e.rute_info || '';
    document.getElementById('eventItinerary').value = e.itinerary || '';
    if (e.gambar_url) { preview.src = e.gambar_url; preview.classList.remove('hidden'); }
    else { preview.classList.add('hidden'); }
  } else {
    document.getElementById('eventModalTitle').textContent = 'Tambah Event';
    document.getElementById('eventNama').value = '';
    document.getElementById('eventDeskripsi').value = '';
    document.getElementById('eventTanggal').value = '';
    document.getElementById('eventLokasi').value = '';
    document.getElementById('eventJarak').value = '';
    document.getElementById('eventResmi').checked = true;
    document.getElementById('eventRute').value = '';
    document.getElementById('eventItinerary').value = '';
    preview.classList.add('hidden');
  }
  modal.classList.remove('hidden');
}

function closeEventModal() {
  document.getElementById('eventModal').classList.add('hidden');
}

async function saveEvent() {
  const id = document.getElementById('eventModal').dataset.eventId;
  const nama = document.getElementById('eventNama').value.trim();
  const deskripsi = document.getElementById('eventDeskripsi').value.trim();
  const tanggal = document.getElementById('eventTanggal').value;
  const lokasi = document.getElementById('eventLokasi').value.trim();
  const jarak = document.getElementById('eventJarak').value.trim();
  const isResmi = document.getElementById('eventResmi').checked;
  const rute = document.getElementById('eventRute').value.trim();
  const itinerary = document.getElementById('eventItinerary').value.trim();
  const fotoFile = document.getElementById('eventFoto').files[0];

  if (!nama || !tanggal) { showToast('Nama dan tanggal wajib diisi'); return; }

  const btn = document.getElementById('saveEventBtn');
  btn.disabled = true;
  btn.textContent = fotoFile ? 'Mengunggah foto...' : 'Menyimpan...';

  const payload = { nama, deskripsi, tanggal, lokasi, jarak, is_resmi: isResmi, rute_info: rute, itinerary };

  try {
    if (fotoFile) payload.gambar_url = await uploadEventImage(fotoFile);
    let error;
    if (id) ({ error } = await supabaseClient.from('events').update(payload).eq('id', id));
    else ({ error } = await supabaseClient.from('events').insert(payload));
    if (error) throw error;
    closeEventModal();
    showToast(id ? 'Event berhasil diperbarui' : 'Event berhasil ditambahkan');
    loadEvents();
  } catch (err) {
    showToast('Gagal menyimpan: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Simpan';
  }
}

async function deleteEvent(id, nama) {
  if (!confirm(`Hapus event "${nama}"? Data kehadiran terkait juga akan terhapus.`)) return;
  await supabaseClient.from('absensi').delete().eq('event_id', id);
  await supabaseClient.from('event_members').delete().eq('event_id', id);
  const { error } = await supabaseClient.from('events').delete().eq('id', id);
  if (error) { showToast('Gagal menghapus event'); return; }
  allEvents = allEvents.filter(x => x.id !== id);
  renderEventTabs();
  renderEventsList();
  showToast(`Event "${nama}" dihapus`);
}

function renderGaleriList() {
  const container = document.getElementById('galeriListContainer');
  if (allGaleri.length === 0) {
    container.innerHTML = '<div class="empty-state">Belum ada foto galeri. Klik "+ Tambah Foto" untuk mulai.</div>';
    return;
  }
  container.innerHTML = allGaleri.map(g => `
    <div style="background:var(--black-3); border:1px solid rgba(212,175,55,0.1); border-radius:12px; overflow:hidden;">
      <img src="${g.foto_url}" style="width:100%; aspect-ratio:1; object-fit:cover; display:block;"/>
      <div style="padding:8px 10px;">
        <div style="font-size:0.75rem; color:var(--grey-light); margin-bottom:6px; min-height:1.2em;">${g.keterangan ? escapeHtml(g.keterangan) : ''}</div>
        <div style="display:flex; gap:6px;">
          <button class="icon-btn" style="border-color:rgba(212,175,55,0.4); color:var(--gold); background:rgba(212,175,55,0.08);" onclick="openGaleriModal('${g.id}')" title="Edit">✎</button>
          <button class="icon-btn delete" onclick="deleteGaleri('${g.id}')" title="Hapus">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

function previewGaleriFoto(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const preview = document.getElementById('galeriFotoPreview');
  preview.src = URL.createObjectURL(file);
  preview.classList.remove('hidden');
}

async function uploadGaleriImage(file) {
  const ext = file.name.split('.').pop();
  const fileName = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error } = await supabaseClient.storage.from('galeri-images').upload(fileName, file);
  if (error) throw error;
  const { data } = supabaseClient.storage.from('galeri-images').getPublicUrl(fileName);
  return data.publicUrl;
}

function openGaleriModal(id) {
  const modal = document.getElementById('galeriModal');
  modal.dataset.galeriId = id || '';
  document.getElementById('galeriFoto').value = '';
  const preview = document.getElementById('galeriFotoPreview');
  if (id) {
    const g = allGaleri.find(x => x.id === id);
    document.getElementById('galeriModalTitle').textContent = 'Edit Foto Galeri';
    document.getElementById('galeriKeterangan').value = g.keterangan || '';
    document.getElementById('galeriUrutan').value = g.urutan ?? 0;
    if (g.foto_url) { preview.src = g.foto_url; preview.classList.remove('hidden'); }
    else { preview.classList.add('hidden'); }
  } else {
    document.getElementById('galeriModalTitle').textContent = 'Tambah Foto Galeri';
    document.getElementById('galeriKeterangan').value = '';
    document.getElementById('galeriUrutan').value = allGaleri.length;
    preview.classList.add('hidden');
  }
  modal.classList.remove('hidden');
}

function closeGaleriModal() {
  document.getElementById('galeriModal').classList.add('hidden');
}

async function saveGaleri() {
  const id = document.getElementById('galeriModal').dataset.galeriId;
  const keterangan = document.getElementById('galeriKeterangan').value.trim();
  const urutan = parseInt(document.getElementById('galeriUrutan').value) || 0;
  const fotoFile = document.getElementById('galeriFoto').files[0];

  if (!id && !fotoFile) { showToast('Foto wajib diunggah'); return; }

  const btn = document.getElementById('saveGaleriBtn');
  btn.disabled = true;
  btn.textContent = fotoFile ? 'Mengunggah foto...' : 'Menyimpan...';

  const payload = { keterangan, urutan };

  try {
    if (fotoFile) payload.foto_url = await uploadGaleriImage(fotoFile);
    let error;
    if (id) ({ error } = await supabaseClient.from('galeri').update(payload).eq('id', id));
    else ({ error } = await supabaseClient.from('galeri').insert(payload));
    if (error) throw error;
    closeGaleriModal();
    showToast(id ? 'Foto berhasil diperbarui' : 'Foto berhasil ditambahkan');
    loadGaleri();
  } catch (err) {
    showToast('Gagal menyimpan: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Simpan';
  }
}

async function deleteGaleri(id) {
  if (!confirm('Hapus foto ini dari galeri?')) return;
  const { error } = await supabaseClient.from('galeri').delete().eq('id', id);
  if (error) { showToast('Gagal menghapus foto'); return; }
  allGaleri = allGaleri.filter(x => x.id !== id);
  renderGaleriList();
  showToast('Foto dihapus');
}

/* ===== DATA GARASI (read-only, buat keperluan pendataan admin) ===== */
async function loadGarasiAdmin() {
  const container = document.getElementById('garasiAdminContainer');
  container.innerHTML = '<div class="loading-state">Memuat data...</div>';
  const { data, error } = await supabaseClient
    .from('garasi_kendaraan')
    .select('*, profiles(nama, no_anggota, whatsapp, domisili)')
    .order('created_at', { ascending: false });
  if (error) {
    container.innerHTML = `<div class="empty-state">Gagal memuat data: ${error.message}</div>`;
    return;
  }
  allGarasiAdmin = data || [];
  renderGarasiAdminList();
}

function renderGarasiAdminList() {
  const search = (document.getElementById('garasiSearchInput')?.value || '').toLowerCase();
  let filtered = allGarasiAdmin;
  if (search) {
    filtered = allGarasiAdmin.filter(v => {
      const p = v.profiles || {};
      return (
        (p.nama || '').toLowerCase().includes(search) ||
        (p.no_anggota || '').toLowerCase().includes(search) ||
        (v.nomor_polisi || '').toLowerCase().includes(search)
      );
    });
  }
  const container = document.getElementById('garasiAdminContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">Tidak ada data kendaraan yang cocok.</div>';
    return;
  }
  container.innerHTML = filtered.map(v => {
    const p = v.profiles || {};
    return `
      <div class="member-card">
        ${v.foto_url ? `<img src="${v.foto_url}" style="width:64px; height:64px; object-fit:cover; flex-shrink:0; border-radius:10px;"/>` : `<div style="width:64px;height:64px;flex-shrink:0;border-radius:10px;background:var(--black-4);display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🏍️</div>`}
        <div style="min-width:220px;flex:1;">
          <div class="nama">${escapeHtml(v.nomor_polisi || '-')}</div>
          <div class="member-meta">
            ${v.varian ? `<span>🏍️ ${escapeHtml(v.varian)}</span>` : ''}
            ${v.warna ? `<span>🎨 ${escapeHtml(v.warna)}</span>` : ''}
            ${v.tahun ? `<span>📅 ${v.tahun}</span>` : ''}
          </div>
        </div>
        <div style="min-width:200px;">
          <div style="font-weight:600; font-size:0.9rem;">${escapeHtml(p.nama || 'Member tidak diketahui')}</div>
          <div class="member-meta">
            <span>🎖️ ${escapeHtml(p.no_anggota || '-')}</span>
            ${p.whatsapp ? `<span>📱 ${escapeHtml(p.whatsapp)}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function openAttendanceModal(eventId) {
  currentAttendanceEventId = eventId;
  const e = allEvents.find(x => x.id === eventId);
  document.getElementById('attendanceEventName').textContent = e ? e.nama : '';
  document.getElementById('attendanceChecklist').innerHTML = '<div class="loading-state">Memuat data...</div>';
  document.getElementById('attendanceModal').classList.remove('hidden');

  const [{ data: profilesData, error: profilesError }, { data: absensiData, error: absensiError }] = await Promise.all([
    supabaseClient.from('profiles').select('id, nama, no_anggota').eq('status', 'aktif').order('nama'),
    supabaseClient.from('absensi').select('member_id').eq('event_id', eventId),
  ]);

  if (profilesError || absensiError) {
    document.getElementById('attendanceChecklist').innerHTML = '<div class="empty-state">Gagal memuat data kehadiran.</div>';
    return;
  }

  attendanceMemberIds = new Set((absensiData || []).map(a => a.member_id));
  const activeMembers = profilesData || [];

  if (activeMembers.length === 0) {
    document.getElementById('attendanceChecklist').innerHTML = '<div class="empty-state">Belum ada anggota aktif.</div>';
    return;
  }

  document.getElementById('attendanceChecklist').innerHTML = activeMembers.map(m => `
    <label class="checklist-item">
      <input type="checkbox" value="${m.id}" ${attendanceMemberIds.has(m.id) ? 'checked' : ''} onchange="toggleAttendanceCheckbox('${m.id}', this.checked)"/>
      <span>${escapeHtml(m.nama || '(Belum lengkap)')} ${m.no_anggota ? `<span style="color:var(--grey); font-size:0.8rem;">(${escapeHtml(m.no_anggota)})</span>` : ''}</span>
    </label>
  `).join('');
}

function toggleAttendanceCheckbox(memberId, checked) {
  if (checked) attendanceMemberIds.add(memberId);
  else attendanceMemberIds.delete(memberId);
}

function closeAttendanceModal() {
  document.getElementById('attendanceModal').classList.add('hidden');
  currentAttendanceEventId = null;
}

async function saveAttendance() {
  const eventId = currentAttendanceEventId;
  if (!eventId) return;

  const { data: existing } = await supabaseClient.from('absensi').select('member_id').eq('event_id', eventId);
  const existingIds = new Set((existing || []).map(a => a.member_id));
  const selectedIds = attendanceMemberIds;

  const toAdd = [...selectedIds].filter(id => !existingIds.has(id));
  const toRemove = [...existingIds].filter(id => !selectedIds.has(id));

  if (toAdd.length > 0) {
    const rows = toAdd.map(member_id => ({ event_id: eventId, member_id, hadir_at: new Date().toISOString() }));
    const { error } = await supabaseClient.from('absensi').insert(rows);
    if (error) { showToast('Gagal menyimpan sebagian data: ' + error.message); return; }
  }
  if (toRemove.length > 0) {
    const { error } = await supabaseClient.from('absensi').delete().eq('event_id', eventId).in('member_id', toRemove);
    if (error) { showToast('Gagal menghapus sebagian data: ' + error.message); return; }
  }

  closeAttendanceModal();
  showToast('Kehadiran berhasil disimpan');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
